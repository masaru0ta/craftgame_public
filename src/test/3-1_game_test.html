<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3-1 ゲーム本編テスト</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #game-canvas { display: block; width: 100%; height: 100vh; }

        #debug-panel {
            position: absolute; top: 10px; left: 10px;
            background: rgba(0, 0, 0, 0.7); color: #fff;
            border-radius: 8px; font-size: 12px;
            min-width: 280px; max-height: 90vh; overflow-y: auto;
        }
        #debug-panel.collapsed { min-width: auto; overflow-y: hidden; }
        #debug-panel-header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 15px; cursor: pointer; user-select: none;
            border-bottom: 1px solid #555;
        }
        #debug-panel.collapsed #debug-panel-header { border-bottom: none; }
        #debug-panel-header h3 { margin: 0; font-size: 14px; }
        #debug-panel-toggle {
            background: none; border: none; color: #aaa;
            font-size: 16px; cursor: pointer; padding: 0 4px;
        }
        #debug-panel-toggle:hover { color: #fff; }
        #debug-panel-body { padding: 0 15px 15px; }
        #debug-panel.collapsed #debug-panel-body { display: none; }
        .debug-section { margin-bottom: 10px; }
        .debug-section h4 {
            font-size: 12px; color: #aaa; margin-bottom: 5px;
            cursor: pointer; user-select: none;
        }
        .debug-section h4::before { content: '\25BC '; font-size: 10px; }
        .debug-section.collapsed h4::before { content: '\25B6 '; }
        .debug-section .debug-content { display: block; }
        .debug-section.collapsed .debug-content { display: none; }
        .debug-row { display: flex; justify-content: space-between; margin: 3px 0; }
        .debug-row label { color: #ccc; }
        .debug-row span { color: #4fc3f7; font-weight: bold; }
        .debug-buttons { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 5px; }
        .debug-btn {
            padding: 5px 10px; background: #333; border: 1px solid #555;
            color: #fff; border-radius: 4px; cursor: pointer; font-size: 11px;
        }
        .debug-btn:hover { background: #444; }
        .debug-btn.active { background: #1976d2; border-color: #1976d2; }
        .debug-select, .debug-input {
            padding: 4px 8px; background: #333; border: 1px solid #555;
            color: #fff; border-radius: 4px; font-size: 11px;
        }
        .debug-input { width: 60px; }
        .control-row { display: flex; align-items: center; gap: 10px; margin: 5px 0; }
        .control-row label { min-width: 100px; color: #ccc; }

        .lod-counts { display: grid; grid-template-columns: repeat(2, 1fr); gap: 5px; margin-top: 5px; }
        .lod-count-item {
            display: flex; justify-content: space-between;
            padding: 2px 5px; background: rgba(255,255,255,0.1); border-radius: 3px;
        }

        .crosshair {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 20px; height: 20px; pointer-events: none;
        }
        .crosshair::before, .crosshair::after {
            content: ''; position: absolute; background: rgba(255, 255, 255, 0.8);
        }
        .crosshair::before {
            top: 50%; left: 0; width: 100%; height: 2px; transform: translateY(-50%);
        }
        .crosshair::after {
            left: 50%; top: 0; width: 2px; height: 100%; transform: translateX(-50%);
        }

        #loading-indicator {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.8); color: #fff;
            padding: 20px 40px; border-radius: 8px; font-size: 16px; z-index: 1000;
        }
        #click-to-start {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.8); color: #fff;
            padding: 30px 50px; border-radius: 12px; font-size: 20px;
            cursor: pointer; text-align: center; display: none; z-index: 999;
        }
        #click-to-start:hover { background: rgba(0, 0, 0, 0.9); }

        #hotbar-container {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 6px; z-index: 1002;
            background: rgba(50, 50, 50, 0.95);
            border: 2px solid #888; border-radius: 10px; padding: 10px 12px;
        }
        .hotbar-slot {
            width: 72px; height: 72px; background: rgba(0,0,0,0.5);
            border: 2px solid #555; border-radius: 4px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; font-size: 10px; color: #fff; position: relative;
        }
        .hotbar-slot.selected { border-color: #fff; background: rgba(255,255,255,0.2); }
        .hotbar-slot img { width: 54px; height: 54px; image-rendering: pixelated; }
        .hotbar-count {
            position: absolute; bottom: 2px; right: 4px;
            font-size: 14px; font-weight: bold;
            text-shadow: 1px 1px 2px #000; color: #fff;
        }

        /* タッチ操作UI */
        #touch-controls {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1001; pointer-events: none;
            touch-action: none; user-select: none;
        }
        #touch-controls > * { pointer-events: auto; }

        #touch-btn-forward, #touch-btn-backward {
            position: fixed; left: 50%; transform: translateX(-50%);
            width: 70px; height: 70px;
            display: flex; align-items: center; justify-content: center;
            background: rgba(255,255,255,0.15); border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%; touch-action: none; opacity: 0.5;
            color: #fff; font-size: 28px;
        }
        #touch-btn-forward { bottom: 320px; }
        #touch-btn-backward { bottom: 160px; }

        #touch-look-area {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            touch-action: none; z-index: -1;
        }

        .touch-btn {
            position: fixed; display: flex; align-items: center; justify-content: center;
            background: rgba(255,255,255,0.15); border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%; color: #fff; font-size: 20px;
            touch-action: none; opacity: 0.5;
        }
        #touch-btn-jump { bottom: 120px; right: 30px; width: 60px; height: 60px; }

        #touch-btn-inventory { bottom: 270px; right: 45px; width: 40px; height: 40px; font-size: 16px; }
        #touch-btn-sneak { bottom: 120px; left: 170px; width: 40px; height: 40px; font-size: 16px; }
        #touch-btn-fly { bottom: 175px; left: 170px; width: 40px; height: 40px; font-size: 16px; }

        /* マッチングUI */
        #matchmaking-container {
            position: fixed; top: 10px; right: 10px;
            z-index: 1003; display: none;
        }
        #matchmaking-status {
            background: rgba(0,0,0,0.7); color: #aaa;
            padding: 6px 12px; border-radius: 6px;
            font-size: 12px; display: none;
            margin-bottom: 6px;
        }
        #matchmaking-join-btn {
            background: rgba(25,118,210,0.9); color: #fff;
            padding: 10px 16px; border-radius: 8px;
            font-size: 14px; cursor: pointer;
            display: none; text-align: center;
            border: 1px solid rgba(255,255,255,0.3);
        }
        #matchmaking-join-btn:hover { background: rgba(25,118,210,1); }

        /* マルチプレイ設定（デバッグパネル内） */
        .mp-input {
            padding: 4px 8px; background: #333; border: 1px solid #555;
            color: #fff; border-radius: 4px; font-size: 11px;
            width: 100px;
        }
        .mp-row { display: flex; align-items: center; gap: 8px; margin: 4px 0; }
        .mp-row label { min-width: 70px; color: #ccc; font-size: 11px; }

    </style>
</head>

    <div id="screen-size-debug" style="
        position:fixed; top:10px; left:50%; transform:translateX(-50%);
        background:rgba(0,0,0,0.85); color:#4fc3f7; padding:8px 16px;
        border-radius:6px; font-size:24px; z-index:9999;
        pointer-events:none; font-family:monospace; white-space:nowrap;
    "></div>
    <script>
    (function(){
        var el = document.getElementById('screen-size-debug');
        function update(){
            var w = window.innerWidth, h = window.innerHeight;
            var ratio = (Math.max(w, h) / Math.min(w, h)).toFixed(2);
            var isTablet = ratio < 1.5;
            var mode = isTablet ? 'TABLET' : (h > w ? 'PORTRAIT' : 'LANDSCAPE');
            el.textContent = w + ' x ' + h + ' ratio:' + ratio + ' ' + mode;
            // タブレット判定時ホットバーを80%に縮小
            var hotbar = document.getElementById('hotbar-container');
            if (hotbar) {
                if (isTablet) {
                    hotbar.style.transform = 'translateX(-50%) scale(0.8)';
                    hotbar.style.transformOrigin = 'center bottom';
                } else {
                    hotbar.style.transform = 'translateX(-50%)';
                    hotbar.style.transformOrigin = '';
                }
            }
        }
        window.addEventListener('resize', update);
        update();
    })();
    </script>

        <!-- マルチプレイ -->

        <!-- ランダムティック -->

                    <label>ティック速度:</label>

                </div>
                <div class="debug-row"><label>状態:</label><span id="debug-tick-status">動作中</span></div>
            </div>
        </div>

        <!-- スケジュールティック -->
